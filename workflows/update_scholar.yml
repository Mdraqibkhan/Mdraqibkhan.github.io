name: Update Google Scholar Data

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write   # Needed to commit scholar.json back to the repo

jobs:
  update-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-scholarly

      - name: Install dependencies
        run: pip install scholarly

      - name: Run Scholar scraper
        run: python scrape_scholar.py

      - name: Commit updated scholar.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scholar.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: auto-update scholar.json [skip ci]"
          git push
